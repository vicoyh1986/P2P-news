name: Refresh News Dashboard

on:
  schedule:
    - cron: '0 0 * * *' # Run daily at 00:00 UTC (8:00 AM SGT)
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write # Grants write permissions to push data changes back to the repository

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Aggregations and Synthesis
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python scripts/refresh.py

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news_data.json
          if git diff --staged --quiet; then
            echo "No updates detected in news feed data. Skipping commit."
          else
            git commit -m "Automated Daily Intelligence Feed Refresh [skip ci]"
            git push
          fi
